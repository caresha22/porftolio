<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/pass.css">

</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="card">
  <div class="card-bar">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span class="card-bar-title">password_analyzer.py — running</span>
  </div>
  <div class="card-body">
    <div class="header">
      <div class="header-label">// Security Tool</div>
      <div class="header-title">Password <em>Strength</em><br>Analyzer</div>
      <div class="header-sub">Real-time entropy scoring, pattern detection &amp; attack simulation</div>
    </div>

    <!-- Input -->
    <div class="input-wrap">
      <label class="input-label" for="pwInput">Enter password</label>
      <input class="pw-input" id="pwInput" type="password" placeholder="type a password to analyze..." autocomplete="off" spellcheck="false">
      <button class="toggle-btn" id="toggleBtn" title="Toggle visibility">👁</button>
    </div>

    <!-- Dynamic content -->
    <div id="results">
      <div class="empty">
        <div class="empty-icon">🔐</div>
        Start typing to analyze your password
      </div>
    </div>

    <div class="footer-note">
      Analysis runs <span>100% locally</span> — your password never leaves this page
    </div>
  </div>
</div>
<script src="../js/pass.js"></script>
</body>
</html>
