<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c0f;
    --surface: #0d1318;
    --surface2: #111d25;
    --border: #1e2d3a;
    --accent: #00e5ff;
    --green: #7fff6e;
    --yellow: #febc2e;
    --orange: #ff8c42;
    --red: #ff4560;
    --text: #c8d8e0;
    --muted: #4a6070;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    cursor: none;
  }

  /* Noise + grid */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 100;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none; z-index: 99;
  }

  /* Cursor */
  .cursor { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; mix-blend-mode: screen; }
  .cursor-ring { width: 28px; height: 28px; border: 1px solid var(--accent); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998; opacity: 0.45; mix-blend-mode: screen; transition: width .2s, height .2s, border-color .2s; }

  /* Card */
  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: fadeUp .7s ease forwards;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* Card header bar */
  .card-bar {
    padding: 12px 20px;
    background: #0a1117;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot:nth-child(1){background:#ff5f57} .dot:nth-child(2){background:#febc2e} .dot:nth-child(3){background:#28c840}
  .card-bar-title { margin-left: 8px; font-size: 11px; color: var(--muted); letter-spacing: 0.15em; }

  /* Card body */
  .card-body { padding: 36px; }

  .header { margin-bottom: 32px; }
  .header-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: #fff; line-height: 1.1; }
  .header-title em { font-style: italic; color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* Input */
  .input-wrap { position: relative; margin-bottom: 28px; }
  .input-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: block; }
  .pw-input {
    width: 100%; padding: 14px 48px 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px;
    letter-spacing: 0.05em; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    cursor: none;
  }
  .pw-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(0,229,255,0.08); }
  .pw-input::placeholder { color: var(--muted); font-size: 13px; letter-spacing: 0; }

  .toggle-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: none;
    font-size: 16px; padding: 4px; transition: color 0.2s;
  }
  .toggle-btn:hover { color: var(--accent); }

  /* Strength meter */
  .strength-section { margin-bottom: 28px; }
  .strength-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .strength-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .strength-word { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--muted); transition: color 0.4s; }

  .meter-track {
    height: 3px; background: var(--border);
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px;
    margin-bottom: 8px;
  }
  .meter-seg {
    height: 100%; background: var(--border);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }
  .meter-seg.lit { box-shadow: 0 0 6px currentColor; }

  .entropy-line { font-size: 11px; color: var(--muted); }
  .entropy-val { color: var(--accent); }

  /* Checks grid */
  .checks-section { margin-bottom: 28px; }
  .checks-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .checks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border: 1px solid var(--border);
    background: var(--surface2); transition: border-color 0.3s, background 0.3s;
  }
  .check-item.pass { border-color: rgba(127,255,110,0.3); background: rgba(127,255,110,0.04); }
  .check-item.fail { border-color: rgba(255,69,96,0.15); }
  .check-icon { font-size: 12px; width: 16px; text-align: center; flex-shrink: 0; }
  .check-text { font-size: 11px; color: var(--muted); transition: color 0.3s; }
  .check-item.pass .check-text { color: var(--green); }

  /* Attack simulation */
  .attack-section { margin-bottom: 28px; }
  .attack-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .attack-rows { display: flex; flex-direction: column; gap: 6px; }
  .attack-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border: 1px solid var(--border); background: var(--surface2);
  }
  .attack-name { font-size: 11px; color: var(--muted); }
  .attack-time { font-size: 12px; font-weight: 500; }

  /* Suggestions */
  .suggestions { border: 1px solid rgba(254,188,46,0.25); background: rgba(254,188,46,0.04); padding: 18px 20px; }
  .suggestions-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--yellow); margin-bottom: 12px; }
  .suggestion-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .suggestion-list li { font-size: 12px; color: var(--muted); padding-left: 16px; position: relative; }
  .suggestion-list li::before { content: '→'; position: absolute; left: 0; color: var(--yellow); }

  /* Empty state */
  .empty {
    text-align: center; padding: 40px 20px;
    font-size: 12px; color: var(--muted);
    border: 1px dashed var(--border);
    letter-spacing: 0.05em;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  /* Pattern warnings */
  .pattern-section { margin-bottom: 28px; }
  .pattern-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .pattern-tag {
    display: inline-block; padding: 4px 12px; margin: 4px;
    border: 1px solid rgba(255,69,96,0.35); color: var(--red);
    font-size: 11px; letter-spacing: 0.05em;
  }

  .footer-note { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); text-align: center; }
  .footer-note span { color: var(--accent); }

  /* Color states */
  .c-red { color: var(--red) !important; }
  .c-orange { color: var(--orange) !important; }
  .c-yellow { color: var(--yellow) !important; }
  .c-lblue { color: #5fddff !important; }
  .c-green { color: var(--green) !important; }

  .seg-red { background: var(--red) !important; color: var(--red); }
  .seg-orange { background: var(--orange) !important; color: var(--orange); }
  .seg-yellow { background: var(--yellow) !important; color: var(--yellow); }
  .seg-lblue { background: #5fddff !important; color: #5fddff; }
  .seg-green { background: var(--green) !important; color: var(--green); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="card">
  <div class="card-bar">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span class="card-bar-title">password_analyzer.py — running</span>
  </div>
  <div class="card-body">
    <div class="header">
      <div class="header-label">// Security Tool</div>
      <div class="header-title">Password <em>Strength</em><br>Analyzer</div>
      <div class="header-sub">Real-time entropy scoring, pattern detection &amp; attack simulation</div>
    </div>

    <!-- Input -->
    <div class="input-wrap">
      <label class="input-label" for="pwInput">Enter password</label>
      <input class="pw-input" id="pwInput" type="password" placeholder="type a password to analyze..." autocomplete="off" spellcheck="false">
      <button class="toggle-btn" id="toggleBtn" title="Toggle visibility">👁</button>
    </div>

    <!-- Dynamic content -->
    <div id="results">
      <div class="empty">
        <div class="empty-icon">🔐</div>
        Start typing to analyze your password
      </div>
    </div>

    <div class="footer-note">
      Analysis runs <span>100% locally</span> — your password never leaves this page
    </div>
  </div>
</div>

<script>
// ─── CURSOR ───────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e=>{
  mx=e.clientX; my=e.clientY;
  cursor.style.transform=`translate(${mx-4}px,${my-4}px)`;
});
(function animRing(){
  rx+=(mx-rx-14)*0.13; ry+=(my-ry-14)*0.13;
  ring.style.transform=`translate(${rx}px,${ry}px)`;
  requestAnimationFrame(animRing);
})();
document.querySelectorAll('button,input').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.style.width='40px';ring.style.height='40px';ring.style.borderColor='#7fff6e';});
  el.addEventListener('mouseleave',()=>{ring.style.width='28px';ring.style.height='28px';ring.style.borderColor='var(--accent)';});
});

// ─── TOGGLE VISIBILITY ────────────────────────────────
const pwInput = document.getElementById('pwInput');
const toggleBtn = document.getElementById('toggleBtn');
let visible = false;
toggleBtn.addEventListener('click', ()=>{
  visible = !visible;
  pwInput.type = visible ? 'text' : 'password';
  toggleBtn.textContent = visible ? '🙈' : '👁';
});

// ─── COMMON PASSWORDS (sample) ────────────────────────
const COMMON = new Set([
  'password','123456','password1','qwerty','abc123','letmein','monkey',
  'master','dragon','111111','baseball','iloveyou','trustno1','sunshine',
  'princess','welcome','shadow','superman','michael','football','password123',
  '123456789','12345678','1234567','1234567890','qwertyuiop','1q2w3e4r',
  'admin','login','hello','charlie','donald','password!','passw0rd','p@ssword',
  'p@ssw0rd','test','guest','root','toor','pass','changeme'
]);

// ─── PATTERN DETECTION ────────────────────────────────
function detectPatterns(pw) {
  const patterns = [];
  if (/^(.)\1+$/.test(pw)) patterns.push('All same character');
  if (/012|123|234|345|456|567|678|789|890|987|876|765|654|543|432|321|210/.test(pw)) patterns.push('Sequential numbers');
  if (/abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz/i.test(pw)) patterns.push('Sequential letters');
  if (/qwert|asdf|zxcv|qwerty|asdfg|dvorak/i.test(pw)) patterns.push('Keyboard pattern');
  if (/19\d{2}|20\d{2}/.test(pw)) patterns.push('Year pattern');
  if (/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\b/i.test(pw)) patterns.push('Month name');
  if (/(.)\1{2,}/.test(pw)) patterns.push('Repeated characters');
  if (COMMON.has(pw.toLowerCase())) patterns.push('Common password');
  return patterns;
}

// ─── ENTROPY CALCULATION ──────────────────────────────
function calcEntropy(pw) {
  let pool = 0;
  if (/[a-z]/.test(pw)) pool += 26;
  if (/[A-Z]/.test(pw)) pool += 26;
  if (/[0-9]/.test(pw)) pool += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) pool += 32;
  return pool === 0 ? 0 : Math.round(pw.length * Math.log2(pool));
}

// ─── CRACK TIME ESTIMATION ────────────────────────────
function crackTime(entropy) {
  // guesses per second for different attack types
  const scenarios = [
    { name: 'Online attack (throttled)', gps: 100 },
    { name: 'Online attack (unthrottled)', gps: 10_000 },
    { name: 'Offline (bcrypt)', gps: 100_000 },
    { name: 'Offline (MD5 hash)', gps: 1_000_000_000 },
    { name: 'GPU cluster attack', gps: 100_000_000_000 },
  ];
  const totalGuesses = Math.pow(2, entropy);
  return scenarios.map(s => {
    const secs = totalGuesses / s.gps / 2; // avg half keyspace
    return { name: s.name, time: formatTime(secs) };
  });
}

function formatTime(secs) {
  if (secs < 1) return { label: '< 1 second', color: 'var(--red)' };
  if (secs < 60) return { label: `${Math.round(secs)} seconds`, color: 'var(--red)' };
  if (secs < 3600) return { label: `${Math.round(secs/60)} minutes`, color: 'var(--orange)' };
  if (secs < 86400) return { label: `${Math.round(secs/3600)} hours`, color: 'var(--orange)' };
  if (secs < 2592000) return { label: `${Math.round(secs/86400)} days`, color: 'var(--yellow)' };
  if (secs < 31536000) return { label: `${Math.round(secs/2592000)} months`, color: 'var(--yellow)' };
  if (secs < 31536000*1000) return { label: `${Math.round(secs/31536000)} years`, color: 'var(--green)' };
  if (secs < 31536000*1e9) return { label: `${(secs/31536000/1000).toFixed(1)}k years`, color: 'var(--green)' };
  return { label: 'Centuries+', color: 'var(--green)' };
}

// ─── SCORE & GRADE ────────────────────────────────────
function getScore(pw) {
  if (pw.length === 0) return { score: 0, label: '', colorClass: '' };
  const entropy = calcEntropy(pw);
  const patterns = detectPatterns(pw);
  const patPenalty = patterns.length * 10;
  const adjusted = Math.max(0, entropy - patPenalty);

  let score, label, colorClass;
  if (COMMON.has(pw.toLowerCase())) {
    score = 1; label = 'Compromised'; colorClass = 'c-red';
  } else if (adjusted < 28) {
    score = 1; label = 'Very Weak'; colorClass = 'c-red';
  } else if (adjusted < 40) {
    score = 2; label = 'Weak'; colorClass = 'c-orange';
  } else if (adjusted < 55) {
    score = 3; label = 'Fair'; colorClass = 'c-yellow';
  } else if (adjusted < 70) {
    score = 4; label = 'Strong'; colorClass = 'c-lblue';
  } else {
    score = 5; label = 'Very Strong'; colorClass = 'c-green';
  }
  return { score, label, colorClass, entropy, adjusted };
}

// ─── CHECKS ───────────────────────────────────────────
function getChecks(pw) {
  return [
    { text: '12+ characters', pass: pw.length >= 12 },
    { text: 'Uppercase letter', pass: /[A-Z]/.test(pw) },
    { text: 'Lowercase letter', pass: /[a-z]/.test(pw) },
    { text: 'Number', pass: /[0-9]/.test(pw) },
    { text: 'Special character', pass: /[^a-zA-Z0-9]/.test(pw) },
    { text: 'Not a common password', pass: !COMMON.has(pw.toLowerCase()) },
    { text: 'No keyboard patterns', pass: !/qwert|asdf|zxcv/i.test(pw) },
    { text: 'No sequential numbers', pass: !/012|123|234|345|456|567|678|789/.test(pw) },
  ];
}

// ─── SUGGESTIONS ──────────────────────────────────────
function getSuggestions(pw, checks, patterns) {
  const tips = [];
  if (pw.length < 12) tips.push(`Add ${12 - pw.length} more characters (aim for 16+)`);
  if (!/[A-Z]/.test(pw)) tips.push('Include at least one uppercase letter');
  if (!/[a-z]/.test(pw)) tips.push('Include at least one lowercase letter');
  if (!/[0-9]/.test(pw)) tips.push('Add numbers to increase character pool');
  if (!/[^a-zA-Z0-9]/.test(pw)) tips.push('Use special characters like !@#$%^&*');
  if (patterns.includes('Keyboard pattern')) tips.push('Avoid keyboard walks like "qwerty" or "asdf"');
  if (patterns.includes('Sequential numbers')) tips.push('Avoid sequential numbers like "123" or "456"');
  if (patterns.includes('Common password')) tips.push('This password appears in breach databases — never use it');
  if (patterns.includes('Repeated characters')) tips.push('Avoid repeating the same character multiple times');
  if (tips.length === 0 && pw.length >= 16) tips.push('Consider using a passphrase for maximum memorability');
  return tips.slice(0, 4);
}

// ─── SEGMENT COLORS ───────────────────────────────────
const segClass = ['', 'seg-red', 'seg-orange', 'seg-yellow', 'seg-lblue', 'seg-green'];

// ─── RENDER ───────────────────────────────────────────
function render(pw) {
  const results = document.getElementById('results');

  if (!pw) {
    results.innerHTML = `<div class="empty"><div class="empty-icon">🔐</div>Start typing to analyze your password</div>`;
    return;
  }

  const { score, label, colorClass, entropy } = getScore(pw);
  const checks = getChecks(pw);
  const patterns = detectPatterns(pw);
  const suggestions = getSuggestions(pw, checks, patterns);
  const attacks = crackTime(entropy);

  // Meter segments
  const segs = Array.from({length: 5}, (_, i) =>
    `<div class="meter-seg ${i < score ? segClass[score] + ' lit' : ''}"></div>`
  ).join('');

  // Checks HTML
  const checksHtml = checks.map(c => `
    <div class="check-item ${c.pass ? 'pass' : 'fail'}">
      <span class="check-icon">${c.pass ? '✓' : '✗'}</span>
      <span class="check-text">${c.text}</span>
    </div>
  `).join('');

  // Attack rows
  const attackHtml = attacks.map(a => `
    <div class="attack-row">
      <span class="attack-name">${a.name}</span>
      <span class="attack-time" style="color:${a.time.color}">${a.time.label}</span>
    </div>
  `).join('');

  // Patterns
  const patternHtml = patterns.length > 0
    ? `<div class="pattern-section">
        <div class="pattern-label">// Detected Patterns</div>
        ${patterns.map(p => `<span class="pattern-tag">⚠ ${p}</span>`).join('')}
      </div>`
    : '';

  // Suggestions
  const suggHtml = suggestions.length > 0
    ? `<div class="suggestions">
        <div class="suggestions-label">// Recommendations</div>
        <ul class="suggestion-list">
          ${suggestions.map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>`
    : `<div class="suggestions" style="border-color:rgba(127,255,110,.3);background:rgba(127,255,110,.04);">
        <div class="suggestions-label" style="color:var(--green);">// All Checks Passed</div>
        <ul class="suggestion-list"><li style="color:var(--green)">This password meets all security criteria ✓</li></ul>
      </div>`;

  results.innerHTML = `
    <div class="strength-section">
      <div class="strength-header">
        <span class="strength-label">// Strength Score</span>
        <span class="strength-word ${colorClass}">${label}</span>
      </div>
      <div class="meter-track">${segs}</div>
      <div class="entropy-line">Entropy: <span class="entropy-val">${entropy} bits</span> &nbsp;·&nbsp; Length: <span class="entropy-val">${pw.length}</span> chars</div>
    </div>

    ${patternHtml}

    <div class="checks-section">
      <div class="checks-label">// Security Checks</div>
      <div class="checks-grid">${checksHtml}</div>
    </div>

    <div class="attack-section">
      <div class="attack-label">// Time to Crack</div>
      <div class="attack-rows">${attackHtml}</div>
    </div>

    ${suggHtml}
  `;
}

// ─── EVENT ────────────────────────────────────────────
pwInput.addEventListener('input', e => render(e.target.value));
</script>
</body>
</html>
